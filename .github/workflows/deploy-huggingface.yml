name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

# ADD THIS BLOCK: It automatically cancels old queued runs when a new push happens
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-22.04  # Make sure this is changed from ubuntu-latest!

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://huggermay3:${HF_TOKEN}@huggingface.co/spaces/huggermay3/ffmped main
